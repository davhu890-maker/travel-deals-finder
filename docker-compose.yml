version: '3.8'

services:
  travel-deals-finder:
    build: .
    container_name: travel-deals-finder
    restart: always
    volumes:
      - ./config.json:/app/config.json:ro
      - ./deal_history.json:/app/deal_history.json
      - ./logs:/app/logs
    environment:
      - SEARCH_INTERVAL_MINUTES=60
      - RUN_ONCE=false
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
